name: Deploy Frontend

on:
  push:
    branches: [main, master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build check
        run: |
          npm ci || npm install
          npm run build || true
        env:
          CI: true
          NEXT_PUBLIC_API_URL: https://allohgaqayt.uz/api

      - name: Copy frontend files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "src/,public/,package.json,package-lock.json,next.config.js,tsconfig.json,tailwind.config.ts,postcss.config.js,Dockerfile"
          target: /root/ziyodullo/frontend
          overwrite: true

      - name: Rebuild frontend container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          timeout: 300s
          script: |
            set -e
            echo "=== Frontend deploy boshlandi ==="
            cd /root/ziyodullo

            # Rebuild frontend container
            docker compose stop frontend
            docker compose rm -f frontend
            docker compose build --no-cache frontend
            docker compose up -d frontend

            # Wait and check
            sleep 20
            docker compose ps frontend
            docker compose logs frontend --tail=20
            echo "=== Frontend deploy tugadi ==="
